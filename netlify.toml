[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/api/tts"
  to     = "/.netlify/functions/tts"
  status = 200

[[redirects]]
  from   = "/api/chat"
  to     = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from   = "/api/stripe-webhook"
  to     = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from   = "/api/customer-portal"
  to     = "/.netlify/functions/customer-portal"
  status = 200

[[redirects]]
  from   = "/api/create-checkout"
  to     = "/.netlify/functions/create-checkout"
  status = 200

[[redirects]]
  from   = "/api/intelligence"
  to     = "/.netlify/functions/intelligence"
  status = 200

[[redirects]]
  from   = "/api/learning-path"
  to     = "/.netlify/functions/learning-path"
  status = 200

[[redirects]]
  from   = "/api/redeem-workbook-code"
  to     = "/.netlify/functions/redeem-workbook-code"
  status = 200

[[redirects]]
  from   = "/api/coaching-card"
  to     = "/.netlify/functions/coaching-card"
  status = 200

[[redirects]]
  from   = "/api/log-page-view"
  to     = "/.netlify/functions/log-page-view"
  status = 200

[[redirects]]
  from   = "/api/track-event"
  to     = "/.netlify/functions/track-event"
  status = 200

[[redirects]]
  from   = "/api/assessment-score"
  to     = "/.netlify/functions/assessment-score"
  status = 200

[[redirects]]
  from   = "/api/pronunciation-check"
  to     = "/.netlify/functions/pronunciation-check"
  status = 200

[[redirects]]
  from   = "/api/create-custom-token"
  to     = "/.netlify/functions/create-custom-token"
  status = 200

[[redirects]]
  from   = "/api/delete-account"
  to     = "/.netlify/functions/delete-account"
  status = 200

[[redirects]]
  from   = "/api/signup-counter"
  to     = "/.netlify/functions/signup-counter"
  status = 200

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
