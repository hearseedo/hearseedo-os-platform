  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #f5f5f5; }

    /* Gate */
    #gate {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #FFB347, #FFD580);
      padding: 24px;
    }
    .gate-card {
      background: #fff; border-radius: 24px; padding: 40px 36px;
      max-width: 400px; width: 100%; text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }
    .gate-emoji { font-size: 52px; margin-bottom: 12px; }
    .gate-title { font-family: 'Baloo 2', sans-serif; font-size: 26px; color: #FFB347; margin-bottom: 6px; }
    .gate-sub { font-size: 14px; color: #999; margin-bottom: 28px; line-height: 1.5; }
    .gate-input {
      width: 100%; padding: 14px 18px;
      font-family: 'Nunito', sans-serif; font-size: 18px;
      border: 2.5px solid #FFB347; border-radius: 12px;
      text-align: center; letter-spacing: 4px; outline: none;
      margin-bottom: 14px; color: #333;
    }
    .gate-input:focus { border-color: #FF8C00; }
    .gate-btn {
      width: 100%; padding: 14px;
      background: #FFB347; color: #fff; border: none; border-radius: 12px;
      font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800;
      cursor: pointer; transition: background 0.2s;
    }
    .gate-btn:hover { background: #FF8C00; }
    .gate-error { color: #e53e3e; font-size: 13px; margin-top: 10px; font-weight: 700; min-height: 20px; }
    .gate-logo { margin-top: 28px; font-size: 11px; color: #ccc; }
    #app { display: none; }
    @media print {
      #gate { display: none !important; }
      #app { display: block !important; }
      .no-print { display: none !important; }
      body { background: #fff; }
    }
  </style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-emoji">🎏</div>
    <div class="gate-title">Golden Wonder Members</div>
    <div class="gate-sub">Enter your Golden Wonder member password<br/>to access all 36 printable worksheets</div>
    <input id="pw-input" class="gate-input" type="password" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') checkPassword()" autocomplete="off"/>
    <button class="gate-btn" onclick="checkPassword()">🔓 Enter</button>
    <div class="gate-error" id="pw-error"></div>
    <div class="gate-logo">Hear See Do™ · Wonder Camp English</div>
    <a href="golden-wonder.html" style="display:block;margin-top:14px;font-size:13px;color:#FFB347;font-weight:700;text-decoration:none;">Not a member yet? → Upgrade to Golden Wonder</a>
  </div>
</div>

<!-- REACT APP -->
<div id="app"></div>

<script>
  // ★ Change this to your chosen password ★
  var MEMBER_PASSWORD = "goldenwonder2025";  // ★ Change this to your chosen password ★

  function checkPassword() {
    var input = document.getElementById("pw-input").value.trim().toLowerCase();
    if (input === MEMBER_PASSWORD) {
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";
      sessionStorage.setItem("wc_auth", "1");
    } else {
      document.getElementById("pw-error").textContent = "Incorrect password. Please try again.";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-input").focus();
    }
  }

  // Stay unlocked during same session
  if (sessionStorage.getItem("wc_auth") === "1") {
    document.getElementById("gate").style.display = "none";
    document.getElementById("app").style.display = "block";
  }
</script>

function TraceLine({ text }) {
  const words = text.split(" ");
  return (
    <div style={{ margin: "10px 0" }}>
      <div style={{ fontSize: 11, color: "#999", marginBottom: 4, fontFamily: "'Nunito', sans-serif" }}>✏️ Trace the sentence:</div>
      <div style={{
        border: "2px dashed #ccc",
        borderRadius: 8,
        padding: "10px 16px",
        background: "repeating-linear-gradient(transparent, transparent 33px, #dce8f4 33px, #dce8f4 35px)",
        minHeight: 54,
        display: "flex",
        alignItems: "center",
        flexWrap: "wrap",
        gap: "0 14px",
      }}>
        {words.map((word, wi) => (
          <span key={wi} style={{
            fontFamily: "'Nunito', sans-serif",
            fontSize: 22,
            fontWeight: 700,
            color: "#b0cbea",
            letterSpacing: 1.5,
            display: "inline-block",
          }}>
            {word}
          </span>
        ))}
      </div>
      <div style={{
        border: "2px solid #e0e0e0",
        borderRadius: 8,
        padding: "10px 16px",
        background: "repeating-linear-gradient(transparent, transparent 33px, #e8e8e8 33px, #e8e8e8 35px)",
        minHeight: 54,
        marginTop: 8,
      }} />
    </div>
  );
}

function WordBox({ word, color }) {
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", justifyContent: "center",
      background: color + "22", border: "2px solid " + color,
      borderRadius: 10, padding: "6px 14px", margin: "4px",
      fontFamily: "'Nunito', sans-serif", fontSize: 16, fontWeight: 700,
      color: "#333",
    }}>{word}</div>
  );
}

function DrawBox({ prompt }) {
  return (
    <div style={{ margin: "8px 0" }}>
      <div style={{ fontSize: 11, color: "#999", marginBottom: 4, fontFamily: "'Nunito', sans-serif" }}>✏️ {prompt}</div>
      <div style={{
        border: "2px dashed #ddd",
        borderRadius: 12,
        height: 110,
        background: "#fff",
      }} />
    </div>
  );
}

function Worksheet({ lesson }) {
  const { color, bg } = lesson;

  const levelRows = [
    { label: "Nensho ⭐", phrase: lesson.ns, stars: 1 },
    { label: "Nenchu ⭐⭐", phrase: lesson.nc, stars: 2 },
    { label: "Nencho ⭐⭐⭐", phrase: lesson.no, stars: 3 },
  ];

  return (
    <div style={{
      width: 680,
      minHeight: 960,
      background: "#fff",
      border: `3px solid ${color}`,
      borderRadius: 18,
      fontFamily: "'Nunito', sans-serif",
      overflow: "hidden",
      boxShadow: "0 4px 24px rgba(0,0,0,0.10)",
      pageBreakAfter: "always",
      marginBottom: 32,
    }}>
      {/* Header */}
      <div style={{
        background: `linear-gradient(135deg, ${color}, ${color}bb)`,
        padding: "14px 20px",
        display: "flex", alignItems: "center", gap: 12,
      }}>
        <div style={{ fontSize: 38 }}>{lesson.emoji}</div>
        <div style={{ flex: 1 }}>
          <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>
            {lesson.month} · {lesson.theme}
          </div>
          <div style={{ color: "#fff", fontSize: 19, fontWeight: 800, lineHeight: 1.2 }}>
            Lesson {lesson.id}: {lesson.title}
          </div>
          <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 12, marginTop: 2 }}>
            🎵 {lesson.song}
          </div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 10 }}>Name:</div>
          <div style={{ background: "rgba(255,255,255,0.3)", borderRadius: 6, width: 120, height: 22, marginTop: 4 }} />
          <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 10, marginTop: 6 }}>Date:</div>
          <div style={{ background: "rgba(255,255,255,0.3)", borderRadius: 6, width: 120, height: 22, marginTop: 4 }} />
        </div>
      </div>

      <div style={{ padding: "14px 20px", background: bg }}>
        {/* Vocab words */}
        <div style={{
          background: "#fff", borderRadius: 12, padding: "10px 14px",
          border: `1.5px solid ${color}44`, marginBottom: 10,
        }}>
          <div style={{ fontSize: 12, color: color, fontWeight: 700, marginBottom: 6 }}>📚 Today's Words</div>
          <div>
            {lesson.vocab.map((w, i) => <WordBox key={i} word={w} color={color} />)}
          </div>
        </div>

        {/* Two columns */}
        <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
          {/* Left: Match */}
          <div style={{ flex: 1, background: "#fff", borderRadius: 12, padding: "10px 12px", border: `1.5px solid ${color}44` }}>
            <div style={{ fontSize: 12, color: color, fontWeight: 700, marginBottom: 8 }}>🔗 Match It!</div>
            {lesson.matchLeft.map((word, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", marginBottom: 6, gap: 6 }}>
                <div style={{
                  background: color + "22", border: "1.5px solid " + color,
                  borderRadius: 6, padding: "3px 10px",
                  fontSize: 13, color: "#333", minWidth: 60, textAlign: "center",
                }}>{word}</div>
                <div style={{ flex: 1, borderBottom: "1.5px dashed #ccc", height: 1, minWidth: 20 }} />
                <div style={{ fontSize: 13, color: "#666" }}>{lesson.matchRight[lesson.matchAnswer[i]]}</div>
              </div>
            ))}
          </div>

          {/* Right: Circle Q */}
          <div style={{ flex: 1, background: "#fff", borderRadius: 12, padding: "10px 12px", border: `1.5px solid ${color}44` }}>
            <div style={{ fontSize: 12, color: color, fontWeight: 700, marginBottom: 8 }}>⭕ {lesson.circleQ}</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
              {lesson.circleItems.map((item, i) => (
                <div key={i} style={{
                  border: i === lesson.circleAnswer ? `2.5px solid ${color}` : "1.5px solid #ddd",
                  borderRadius: 8, padding: "6px 8px",
                  fontSize: 14, textAlign: "center",
                  background: i === lesson.circleAnswer ? color + "15" : "#fafafa",
                  fontWeight: i === lesson.circleAnswer ? 700 : 400,
                  color: i === lesson.circleAnswer ? color : "#555",
                }}>{item}</div>
              ))}
            </div>
            {lesson.circleAnswer === -1 && (
              <div style={{ fontSize: 11, color: "#aaa", marginTop: 6, textAlign: "center" }}>Circle YOUR favourite! ⭐</div>
            )}
          </div>
        </div>

        {/* Trace the sentence */}
        <div style={{ background: "#fff", borderRadius: 12, padding: "10px 14px", border: `1.5px solid ${color}44`, marginBottom: 10 }}>
          <TraceLine text={lesson.trace} />
        </div>

        {/* Activity + Draw */}
        <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
          <div style={{ flex: 1.2, background: "#fff", borderRadius: 12, padding: "10px 12px", border: `1.5px solid ${color}44` }}>
            <div style={{ fontSize: 12, color: color, fontWeight: 700, marginBottom: 6 }}>
              {lesson.activity === "colour" ? "🖍️" : "⭕"} {lesson.activityLabel}
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", padding: "6px 0" }}>
              {lesson.svgs.map((svgKey, i) => {
                const SvgComp = SvgMap[svgKey];
                return SvgComp ? (
                  <div key={i} style={{
                    width: 64, height: 64,
                    border: "1.5px solid #ddd",
                    borderRadius: 10,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    background: "#fff",
                    padding: 4,
                  }}>
                    <SvgComp />
                  </div>
                ) : null;
              })}
            </div>
          </div>
          <div style={{ flex: 1, background: "#fff", borderRadius: 12, padding: "10px 12px", border: `1.5px solid ${color}44` }}>
            <DrawBox prompt={lesson.drawPrompt} />
          </div>
        </div>

        {/* Level phrases */}
        <div style={{ background: "#fff", borderRadius: 12, padding: "10px 14px", border: `1.5px solid ${color}44`, marginBottom: 10 }}>
          <div style={{ fontSize: 12, color: color, fontWeight: 700, marginBottom: 8 }}>🗣️ Say It! Choose your level:</div>
          <div style={{ display: "flex", gap: 6 }}>
            {levelRows.map((row, i) => (
              <div key={i} style={{
                flex: 1,
                background: i === 0 ? "#FFF9E6" : i === 1 ? "#F0F9FF" : "#F5FFF0",
                border: `1.5px solid ${i === 0 ? "#FFD700" : i === 1 ? "#60B8D8" : "#68D368"}`,
                borderRadius: 10, padding: "8px 10px", textAlign: "center",
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: i === 0 ? "#B8860B" : i === 1 ? "#1A7FA8" : "#2E7D32" }}>
                  {"⭐".repeat(i + 1)} {["Nensho","Nenchu","Nencho"][i]}
                </div>
                <div style={{ fontSize: 13, color: "#333", marginTop: 4, lineHeight: 1.3 }}>
                  {[lesson.ns, lesson.nc, lesson.no][i]}
                </div>
                <div style={{
                  marginTop: 8, border: "1px dashed #ccc", borderRadius: 6, height: 22,
                  background: "rgba(255,255,255,0.7)", width: "90%", marginLeft: "5%",
                }} />
              </div>
            ))}
          </div>
        </div>

        {/* Footer */}
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          paddingTop: 6,
        }}>
          <div style={{ fontSize: 11, color: "#aaa" }}>Hear See Do™ Wonder Camp · Lesson {lesson.id}</div>
          <div style={{ display: "flex", gap: 4, fontSize: 16 }}>
            {monkey.map((m, i) => <span key={i}>{m}</span>)}
          </div>
          <div style={{ display: "flex", gap: 4 }}>
            {["I tried!", "I said it!", "Super star!"].map((label, i) => (
              <div key={i} style={{
                fontSize: 9, background: color + "15", border: "1px solid " + color + "55",
                borderRadius: 20, padding: "2px 7px", color: color, fontWeight: 600,
              }}>
                ⭐ {label}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState("menu");
  const [selectedMonth, setSelectedMonth] = useState(null);
  const [selectedLesson, setSelectedLesson] = useState(null);

  if (view === "single" && selectedLesson !== null) {
    const lesson = LESSONS[selectedLesson];
    return (
      <div style={{ background: "#f5f5f5", minHeight: "100vh", padding: 20 }}>
        <style>{`@media print { .no-print { display: none !important; } body { background: #fff; } }`}</style>
        <div style={{ maxWidth: 720, margin: "0 auto" }}>
          <div className="no-print" style={{ display: "flex", gap: 10, marginBottom: 18 }}>
            <button onClick={() => { setView("month"); }} style={{
              background: lesson.color, color: "#fff", border: "none", borderRadius: 10,
              padding: "8px 18px", fontFamily: "'Nunito', sans-serif", fontSize: 15,
              cursor: "pointer", fontWeight: 700,
            }}>← Back</button>
            <button onClick={() => window.print()} style={{
              background: "#fff", color: lesson.color, border: "2.5px solid " + lesson.color,
              borderRadius: 10, padding: "8px 20px", fontFamily: "'Nunito', sans-serif",
              fontSize: 15, cursor: "pointer", fontWeight: 700,
              display: "flex", alignItems: "center", gap: 7,
            }}>🖨️ Print Worksheet</button>
          </div>
          <Worksheet lesson={lesson} />
        </div>
      </div>
    );
  }

  if (view === "month" && selectedMonth !== null) {
    const monthLessons = LESSONS.filter(l => l.month === selectedMonth);
    const ml = monthLessons[0];
    return (
      <div style={{ background: "#f5f5f5", minHeight: "100vh", padding: 20 }}>
        <div style={{ maxWidth: 720, margin: "0 auto" }}>
          <div className="no-print" style={{ display: "flex", gap: 10, marginBottom: 18 }}>
            <button onClick={() => setView("menu")} style={{
              background: ml.color, color: "#fff", border: "none", borderRadius: 10,
              padding: "8px 18px", fontFamily: "'Nunito', sans-serif", fontSize: 15,
              cursor: "pointer", fontWeight: 700,
            }}>← All Months</button>
            <button onClick={() => window.print()} style={{
              background: "#fff", color: ml.color, border: "2.5px solid " + ml.color,
              borderRadius: 10, padding: "8px 20px", fontFamily: "'Nunito', sans-serif",
              fontSize: 15, cursor: "pointer", fontWeight: 700,
            }}>🖨️ Print All 3 Worksheets</button>
          </div>
          <div style={{
            background: `linear-gradient(135deg, ${ml.color}, ${ml.color}bb)`,
            borderRadius: 16, padding: "18px 24px", marginBottom: 20,
            display: "flex", alignItems: "center", gap: 14,
          }}>
            <div style={{ fontSize: 46 }}>{ml.emoji}</div>
            <div>
              <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 13 }}>{selectedMonth}</div>
              <div style={{ color: "#fff", fontSize: 22, fontWeight: 800, fontFamily: "'Nunito', sans-serif" }}>{ml.theme}</div>
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {monthLessons.map((lesson, i) => (
              <button key={lesson.id} onClick={() => { setSelectedLesson(LESSONS.indexOf(lesson)); setView("single"); }}
                style={{
                  background: "#fff", border: `2.5px solid ${lesson.color}`,
                  borderRadius: 14, padding: "16px 20px",
                  display: "flex", alignItems: "center", gap: 14,
                  cursor: "pointer", textAlign: "left", transition: "transform 0.15s",
                }}
                onMouseOver={e => e.currentTarget.style.transform = "scale(1.01)"}
                onMouseOut={e => e.currentTarget.style.transform = "scale(1)"}
              >
                <div style={{
                  width: 44, height: 44, borderRadius: "50%",
                  background: lesson.color, color: "#fff",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontFamily: "'Nunito', sans-serif", fontWeight: 800, fontSize: 18,
                }}>L{lesson.id}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: "'Nunito', sans-serif", fontSize: 18, fontWeight: 700, color: "#333" }}>
                    {lesson.title}
                  </div>
                  <div style={{ fontFamily: "'Nunito', sans-serif", fontSize: 13, color: "#888" }}>
                    🎵 {lesson.song}
                  </div>
                </div>
                <div style={{
                  background: lesson.color + "22", borderRadius: 8,
                  padding: "6px 12px", fontFamily: "'Nunito', sans-serif",
                  fontSize: 12, color: lesson.color, fontWeight: 700,
                }}>Open →</div>
              </button>
            ))}
          </div>
          <div style={{ marginTop: 28 }}>
            <div style={{ fontFamily: "'Nunito', sans-serif", fontSize: 14, color: "#888", marginBottom: 12, textAlign: "center" }}>All 3 worksheets</div>
            {monthLessons.map(lesson => (
              <Worksheet key={lesson.id} lesson={lesson} />
            ))}
          </div>
        </div>
      </div>
    );
  }

  // Main menu
  return (
    <div style={{ background: "#F8F4FF", minHeight: "100vh", padding: "24px 16px" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; }
        @media print { button { display: none !important; } }
      `}</style>

      {/* Hero */}
      <div style={{
        maxWidth: 760, margin: "0 auto 28px",
        background: "linear-gradient(135deg, #FF9EB5, #FFB347, #7ECCD9, #1A9BD4)",
        borderRadius: 22, padding: "28px 30px",
        display: "flex", alignItems: "center", gap: 18,
      }}>
        <div style={{ fontSize: 60 }}>🐵</div>
        <div>
          <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 13, fontFamily: "'Nunito', sans-serif", letterSpacing: 1 }}>
            Hear See Do™
          </div>
          <div style={{ color: "#fff", fontSize: 30, fontFamily: "'Baloo 2', 'Nunito', sans-serif", lineHeight: 1.1 }}>
            Wonder Camp English
          </div>
          <div style={{ color: "rgba(255,255,255,0.9)", fontSize: 14, fontFamily: "'Nunito', sans-serif", marginTop: 4 }}>
            Kids Worksheets · All 36 Lessons · Print & Play 🖨️
          </div>
        </div>
        <div style={{ marginLeft: "auto", textAlign: "center" }}>
          <div style={{ color: "#fff", fontSize: 38, fontFamily: "'Baloo 2', 'Nunito', sans-serif" }}>36</div>
          <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 12, fontFamily: "'Nunito', sans-serif" }}>Worksheets</div>
        </div>
      </div>

      {/* Month grid */}
      <div style={{ maxWidth: 760, margin: "0 auto" }}>
        <div style={{ fontFamily: "'Nunito', sans-serif", fontSize: 18, color: "#555", marginBottom: 14, textAlign: "center" }}>
          ✨ Choose a month to see worksheets ✨
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14 }}>
          {MONTHS.map(month => {
            const monthLessons = LESSONS.filter(l => l.month === month);
            const ml = monthLessons[0];
            return (
              <button key={month}
                onClick={() => { setSelectedMonth(month); setView("month"); }}
                style={{
                  background: "#fff",
                  border: `3px solid ${ml.color}`,
                  borderRadius: 16, padding: "16px 14px",
                  cursor: "pointer", textAlign: "left",
                  transition: "transform 0.15s, box-shadow 0.15s",
                  boxShadow: `0 2px 10px ${ml.color}33`,
                }}
                onMouseOver={e => { e.currentTarget.style.transform = "translateY(-3px)"; e.currentTarget.style.boxShadow = `0 8px 20px ${ml.color}55`; }}
                onMouseOut={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = `0 2px 10px ${ml.color}33`; }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <span style={{ fontSize: 28 }}>{ml.emoji}</span>
                  <div>
                    <div style={{ fontFamily: "'Baloo 2', 'Nunito', sans-serif", fontSize: 17, color: ml.color }}>
                      {month}
                    </div>
                    <div style={{ fontFamily: "'Nunito', sans-serif", fontSize: 10, color: "#aaa" }}>
                      3 worksheets
                    </div>
                  </div>
                </div>
                <div style={{ fontFamily: "'Nunito', sans-serif", fontSize: 12, color: "#888", lineHeight: 1.5 }}>
                  {monthLessons.map(l => `L${l.id}: ${l.title}`).join("\n").split("\n").map((line, i) => (
                    <div key={i}>📄 {line}</div>
                  ))}
                </div>
                <div style={{
                  marginTop: 10, background: ml.color + "18", borderRadius: 8,
                  padding: "4px 10px", fontFamily: "'Nunito', sans-serif",
                  fontSize: 11, color: ml.color, fontWeight: 700, textAlign: "center",
                }}>
                  {ml.theme}
                </div>
              </button>
            );
          })}
        </div>

        {/* Monkey footer */}
        <div style={{ textAlign: "center", marginTop: 28, fontFamily: "'Nunito', sans-serif", color: "#aaa", fontSize: 13 }}>
          {monkey.join("  ")}  ·  Milo · Lola · Kiko · Momo  ·  Hear See Do™ Wonder Camp 🌈
        </div>
      </div>
    </div>
  );
}

  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
