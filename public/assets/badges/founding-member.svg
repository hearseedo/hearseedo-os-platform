<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3a0000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e01010" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e01010" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#e01010"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#fff8e0"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="100" cy="100" r="98" fill="url(#glow)"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#ring)" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="#2a0000" stroke-width="1.5"/>
  <!-- Shield shape -->
  <path d="M100 28 L140 50 L140 100 Q140 138 100 158 Q60 138 60 100 L60 50 Z" fill="#1a0000" stroke="#e01010" stroke-width="1.5"/>
  <!-- HSD letters -->
  <text x="100" y="108" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="30" fill="url(#text-grad)" filter="url(#glow-filter)">HSD</text>
  <!-- Stars top -->
  <text x="100" y="52" text-anchor="middle" font-size="12" fill="#C9A84C">★  ★  ★</text>
  <!-- FOUNDING label -->
  <text x="100" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="11" letter-spacing="3" fill="#e01010">FOUNDING</text>
  <!-- MEMBER label -->
  <text x="100" y="156" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="9" letter-spacing="2" fill="#C9A84C">MEMBER</text>
  <!-- Bottom dots -->
  <text x="100" y="178" text-anchor="middle" font-size="8" fill="#C9A84C">· · · · ·</text>
</svg>
