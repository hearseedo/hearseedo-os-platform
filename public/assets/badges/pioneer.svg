<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2a0000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e01010" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e01010" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="98" fill="url(#glow)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#ring)" stroke-width="3"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#3a0000" stroke-width="1.5"/>
  <!-- Rocket / arrow up shape -->
  <path d="M100 50 L115 80 L108 80 L108 120 L92 120 L92 80 L85 80 Z" fill="#1a0000" stroke="#e01010" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Rocket fins -->
  <path d="M92 115 L80 130 L92 125 Z" fill="#e01010" opacity="0.8"/>
  <path d="M108 115 L120 130 L108 125 Z" fill="#e01010" opacity="0.8"/>
  <!-- Flame -->
  <ellipse cx="100" cy="130" rx="8" ry="6" fill="#e01010" opacity="0.7" filter="url(#glow-filter)"/>
  <ellipse cx="100" cy="133" rx="4" ry="4" fill="#ff9900" opacity="0.8"/>
  <!-- Stars top -->
  <text x="100" y="48" text-anchor="middle" font-size="10" fill="#e01010">★ ★ ★</text>
  <!-- Labels -->
  <text x="100" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="13" letter-spacing="3" fill="url(#text-grad)" filter="url(#glow-filter)">PIONEER</text>
  <text x="100" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" letter-spacing="2" fill="#e01010" opacity="0.8">100+ REFERRALS</text>
  <text x="100" y="186" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#ffffff" opacity="0.4">HSD OS</text>
</svg>
