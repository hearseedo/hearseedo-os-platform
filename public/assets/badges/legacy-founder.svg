<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8a6a1a"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#fff8e0"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="98" fill="url(#glow)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#ring)" stroke-width="4"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#2a2000" stroke-width="1.5"/>
  <!-- Crown shape -->
  <path d="M60 130 L60 90 L75 110 L100 72 L125 110 L140 90 L140 130 Z" fill="#1a1200" stroke="#C9A84C" stroke-width="2" stroke-linejoin="round"/>
  <!-- Crown jewels -->
  <circle cx="100" cy="72" r="5" fill="#C9A84C" filter="url(#glow-filter)"/>
  <circle cx="75" cy="110" r="4" fill="#C9A84C"/>
  <circle cx="125" cy="110" r="4" fill="#C9A84C"/>
  <!-- HSD text -->
  <text x="100" y="122" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="24" fill="url(#text-grad)" filter="url(#glow-filter)">HSD</text>
  <!-- Stars -->
  <text x="100" y="53" text-anchor="middle" font-size="14" fill="#C9A84C" filter="url(#glow-filter)">★ ★ ★ ★ ★</text>
  <!-- Labels -->
  <text x="100" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="11" letter-spacing="2" fill="#C9A84C">LEGACY</text>
  <text x="100" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="9" letter-spacing="2" fill="#fff8e0">FOUNDER</text>
  <text x="100" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#C9A84C" opacity="0.7">TOP 100</text>
</svg>
